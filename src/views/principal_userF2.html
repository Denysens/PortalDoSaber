<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal do saber - funcionários </title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="public/style.css">
</head>

<body>
    <h1> Livros Diponíveis </h1>
    <div id="cards-livros"></div>

    <h2> Adiciona livros</h2>
    <form id="adicionar-livro">
        <div class="mb-3">
            <label for="titulo" class="form-label">Título: </label>
            <input type="text" id="titulo" class="form-control" placeholder="Título" name="titulo" required />
        </div>
        <div class="mb-3">
            <label for="autor" class="form-label">Autor(a): </label>
            <input type="text" id="autor" class="form-control" placeholder="Autor(a)" name="autor" required />
        </div>
        <div class="mb-3">
            <label for="editora" class="form-label">Editora: </label>
            <input type="text" id="editora" class="form-control" placeholder="Editora" name="editora" required />
        </div>
        <div class="mb-3">
            <label for="ano_public" class="form-label">Ano Publicação: </label>
            <input type="number" id="ano_public" class="form-control" name="ano_public" required />
        </div>
        <div class="mb-3">
            <label class="form-label" for="categoria">Categoria: </label>
            <select class="form-select" id="categoria" name="categoria">
                <option value=1>Romance</option>
                <option value=3>Comédia</option>
            </select>
        </div>
        <div class="mb-3">
            <label for="descricao" class="form-label">Descrição: </label>
            <textarea class="form-control" id="descricao" rows="3"></textarea>
        </div>
        <button type="submit" onclick="adicionar_livro()"> Adicionar </button>
    </form>

    <script>
        const base_url = "http://localhost:3000";

        //Buscar Livros
        async function buscar_livros() {
            try {
                const res = await fetch(`${base_url}/livros`);
                const livros = await res.json();

                const cards_livros = document.getElementById("cards-livros");

                cards_livros.innerHTML = ' '; //Limpa os cards antes de renderizar 

                livros.forEach(livro => {
                    const card = document.createElement('card');
                    card.innerText = `${livro.titulo} - ${livro.autor}`; //posso trocar para innerhtml

                    cards_livros.appendChild(card);
                });
            } catch (error) {
                console.error("Erro ao buscar os livros: ", error);
            }
        }

        //Adicionar Livros
        function adicionar_livro() {
            const form = document.getElementById("adicionar-livro");
            form.addEventListener('subimt', async (e) => {
                e.preventDefault();

                const titulo = document.getElementById('titulo').value;
                const autor = document.getElementById('autor').value;
                const editora = document.getElementById('editora').value;
                const ano_public = document.getElementById('ano_public').value;
                const categoria = document.getElementById('categoria').value;
                const descricao = document.getElementById('descricao').value;

                try {
                    await fetch(`${base_url}/livros`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', },
                        body: JSON.stringify({ titulo, autor, editora, ano_public, categoria, descricao }),
                    });

                    document.getElementById('titulo').value = '';
                    document.getElementById('autor').value = '';
                    document.getElementById('editora').value = '';
                    document.getElementById('ano_public').value = '';
                    document.getElementById('categoria').value = '';
                    document.getElementById('descricao').value = '';
                } catch (error) {
                    console.error("Erro ao adicionar livro: ", error);
                }
            });
        }

        //Carregar os livros ao iniciar 
        window.onload = buscar_livros;

    </script>
</body>

</html>
