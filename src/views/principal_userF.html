    <div class="container">

            <div class="col-4">
                <h2>Filtrar por:</h2>

                <div class="generos">
                    <a href="#">Fantasia</a> </br>

                <div class="card" style="width: 18rem;">
                    <img src="img/eu_e_esse_meu_coracao.jpg" class="card-img-top" alt="...">
                    <div class="card-body">
                      <h5 class="card-title">Eu e esse meu coração</h5>
                      <p class="card-text">Autor(a): C. C. Hunter <br> Editora: Editora Jangada <br> Ano de publicação: 2018</p>
                      <a href="#" class="btn btn-info"><i class="bi bi-bookmark-fill"></i></a>

    <div class="rodape"> 
        <!-- Button trigger modal -->
        <button id="botao_add_emp" type="button" class="btn btn-info btn-lg" data-bs-toggle="modal" data-bs-target="#staticBackdrop"><i class="bi bi-bookmark-plus-fill"></i></button>
                
        <!-- Modal -->
        <div class="modal fade" id="staticBackdrop" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1" aria-labelledby="staticBackdropLabel" aria-hidden="true">
            <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h1 class="modal-title fs-5" id="staticBackdropLabel">Cadastrar Livro</h1>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form>
                        <div class="mb-3">
                            <label for="imagem" class="form-label">Imagem do livro: </label>
                            <input type="file" id="imagem" class="form-control" aria-label="imagem">
                        </div>
                        <div class="mb-3">
                            <label for="titulo" class="form-label">Título: </label>
                            <input type="text" id="titulo"  class="form-control" placeholder="Título">
                        </div>
                        <div class="mb-3">
                            <label for="autor" class="form-label">Autor(a): </label>
                            <input type="text" id="autor" class="form-control" placeholder="Autor(a)">
                        </div>
                        <div class="mb-3">
                            <label for="editora" class="form-label">Editora: </label>
                            <input type="text" id="editora" class="form-control" placeholder="Editora">
                        </div>
                        <div class="mb-3">
                            <label for="ano_public" class="form-label">Ano Publicação: </label>
                            <input type="number" id="ano_public" class="form-control">
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-primary">Salvar</button>
                </div>
            </div>
            </div>
        </div>
    </div>
