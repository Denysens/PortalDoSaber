<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal do Saber - Home Funcionário</title>
    <link rel="stylesheet" href="public/style_userFunc.css">
</head>

<body>
    <!--Barra de navegação-->
    <nav id="nav">
        <!--Menu oculto-->
        <div id="menu_oculto">
            <a href="javascript:void(0)" class="btn_fechar" onclick="fechar_menu()">Fechar</a>
            <a href="#">Home</a>
            <a href="emprestimos/views">Empréstimos </a>
            <a href="usuarios/views">Usuários</a>
            <a href="login"></i>Sair</a>
        </div>

        <section id="principal">
            <span onclick="abrir_menu()">Abrir</span>
        </section>

        <!--Titulo-->
        <h1 id="title">Portal do Saber</h1>

        <!--Barra de Pesquisa-->
        <form action="livros" method="get">
            <div class="input-caixa">
                <input type="text" name="titulo" id="pesquisa" placeholder="Digite o livro procurado">
            </div>
            <button class="pesquisa-button"> Buscar</button>
        </form>
    </nav>

    <!--Corpo com os livros-->
    <main id="main">
        <div id="cards-livros">
        </div>
    </main>

    <!--Cadastrar livro  -->
    <rodape id="rodape">
        <a href="/cadastrar" class="cadastrar-livro"> Cadastrar</a>
    </rodape>

    <script>
        const base_url = "http://localhost:3000";

        //Função para exibir todos os livros com base no dados pegos no bd (fetch)
        function renderizar_livros(json) {
            const cards = document.getElementById('cards-livros');

            // Se o json não existir (indefinido = false) ele retorna pois é uma negação 
            if (!json) {
                console.log('Json indefinido');
                return;
            }

            // Se o json for um array/ lista 
            if (json instanceof Array) {
                json.forEach(livro => {
                    const card = document.createElement('div');
                    card.classList.add('card-livro'); // Adiciona uma classe para os cards

                    card.innerHTML = `
                <div id="titulo">Titulo: ${livro.titulo}</div>
                <div id="botões">
                    <button onclick="cadastrar_empres()">Emprestar</button>
                </div>
            `;

                    cards.appendChild(card);
                });
            }
            // Se o json for apenas um objeto 
            else {
                const card = document.createElement('div');
                card.classList.add('card-livro'); // Adiciona uma classe para o card

                card.innerHTML = `
            <div id="titulo">Titulo: ${json.nome}</div>
        `;

                cards.appendChild(card);
            }
        }


        //Solicitação GET de todos os livros
        function exibir_livros() {
            fetch(`${base_url}/livros`)
                .then(response => response.json())
                .then(json => renderizar_livros(json))
                .catch(error => {
                    console.error("Erro ao buscar Livros:", error);
                    alert("Erro ao buscar Livros.")
                })
        }

        //Solicitação GET de livros por nome 
        function pesquisar_livro() {
            const titulo = document.getElementById('pesquisa').value;
            fetch(`${base_url}/livros/${titulo}`)
                .then(response => response.json())
                .then(json => renderizar_livros(json))
                .catch(error => {
                    console.error("Erro ao buscar Livro:", error);
                    alert("Erro ao buscar Livro.")
                })
        }

        //Solicitação POST de emprestimo
        function cadastrar_empres() {
            const id_livro = document.getElementById('id_livro');
            const cpf = document.getElementById('cpf');


            fetch(`${base_url}/emprestimos`, {
                method: 'POST',
                body: JSON.stringify({ id_livro, cpf, data_emprestimo, data_devolucao_prevista }),
                headers: { 'Content-Type': 'application/json' }
            })
                .then(response => response.json())
                .then(json => renderizar_livros(json))
                .catch(error => {
                    console.error("Erro ao cadastradar emprestimo:", error);
                    alert("Erro ao cadastradar emprestimo.")
                })
        }

        window.onload = exibir_livros();
    </script>

    <script src="/menu.js"></script>
</body>

</html>
